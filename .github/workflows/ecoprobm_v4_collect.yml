# .github/workflows/ecoprobm_v4_collect.yml
name: EcoProBM v4 Data Collection

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "수집 모드"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mojito2 pandas numpy requests

      - name: Restore state files
        uses: actions/cache@v4
        with:
          path: |
            state/ohlcv_247540.json
            state/supply_data_247540.json
            state/pipeline_state_247540.json
            state/kis_token.json
          key: ecoprobm-v4-state-${{ github.run_number }}
          restore-keys: |
            ecoprobm-v4-state-

      - name: Create state directory
        run: mkdir -p state

      - name: Run data collection
        env:
          KIS_API_KEY: ${{ secrets.KIS_API_KEY }}
          KIS_API_SECRET: ${{ secrets.KIS_API_SECRET }}
          KIS_ACC_NO: ${{ secrets.KIS_ACC_NO }}
          KIS_MOCK: "N"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: "state"
        run: |
          python data_collector.py \
            --mode ${{ github.event.inputs.mode || 'incremental' }} \
            --state-dir state

      - name: Upload state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecoprobm-v4-state-${{ github.run_number }}
          path: state/
          retention-days: 30

      - name: Commit state files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "chore: update ecoprobm v4 state $(date +%Y-%m-%d)"
          git push
