# .github/workflows/ecoprobm_v4_collect.yml
# ──────────────────────────────────────────────
# 에코프로비엠 (247540) v4 — 데이터 수집 (pykrx)
# cron-job.org에서 workflow_dispatch로 트리거
# ──────────────────────────────────────────────

name: EcoProBM v4 Data Collection

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "수집 모드"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

# schedule 블록 없음 → cron-job.org에서 workflow_dispatch 호출
# 수집 스케줄:
#   09:05 KST — 전일 확정 데이터 수집 (OHLCV + 수급 + 공매도)
#   18:30 KST — 당일 확정 데이터 수집 (투자자별 매매는 18시 이후 확정)
#
# ※ 기존 4회(09:05, 11:00, 13:30, 15:10)에서 2회로 축소
#   → 데이터 수집은 확정 데이터만 필요. 장중 트레이딩은 Phase 2에서 별도 워크플로우

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pykrx pandas numpy requests
          # FDR은 fallback 전용 (선택 설치)
          pip install FinanceDataReader || true

      - name: Restore state files
        uses: actions/cache@v4
        with:
          path: |
            state/ohlcv_247540.json
            state/supply_data_247540.json
            state/pipeline_state_247540.json
          key: ecoprobm-v4-state-${{ github.run_number }}
          restore-keys: |
            ecoprobm-v4-state-

      - name: Create state directory
        run: mkdir -p state

      - name: Run data collection
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: "state"
        run: |
          python data_collector.py \
            --mode ${{ github.event.inputs.mode || 'incremental' }} \
            --state-dir state

      - name: Upload state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecoprobm-v4-state-${{ github.run_number }}
          path: state/
          retention-days: 30

      - name: Commit state files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "chore: update ecoprobm v4 state $(date +%Y-%m-%d)"
          git push
