# .github/workflows/ecoprobm_v4_optimize.yml
name: EcoProBM v4 Monthly Parameter Optimization

on:
  workflow_dispatch:
    inputs:
      trials:
        description: "Optuna trial 횟수"
        required: false
        default: "50"
      threshold:
        description: "score 개선 임계 (이 값 이상이면 파라미터 갱신)"
        required: false
        default: "0.05"

# cron-job.org에서 매월 1일 새벽 03:00 KST (= 매월 1일 18:00 UTC 전날)에
# workflow_dispatch 호출. 시장이 닫혀 있고 retrain과 충돌하지 않는 시간대.

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mojito2 pandas numpy requests
          pip install hmmlearn scikit-learn optuna

      - name: Restore state files
        uses: actions/cache@v4
        with:
          path: |
            state/ohlcv_247540.json
            state/optimized_params_247540.json
            state/optimization_history_247540.json
          key: ecoprobm-v4-optimize-${{ github.run_number }}
          restore-keys: |
            ecoprobm-v4-optimize-
            ecoprobm-v4-bot-

      - name: Create state directory
        run: mkdir -p state

      - name: Run optimization
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: "state"
        run: |
          python optimizer.py \
            --state-dir state \
            --trials ${{ github.event.inputs.trials || '50' }} \
            --threshold ${{ github.event.inputs.threshold || '0.05' }}

      - name: Upload state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecoprobm-v4-optimize-state-${{ github.run_number }}
          path: state/
          retention-days: 90

      - name: Commit updated params
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "opt: monthly param tuning $(date +%Y-%m-%d)"
          git push
