# .github/workflows/ecoprobm_v4_bot.yml
name: EcoProBM v4 Trading Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        required: false
        default: "morning"
        type: choice
        options:
          - morning     # 09:05 KST — 시그널 + 주문
          - closing     # 15:10 KST — 체결 확인
          - evening     # 18:30 KST — 데이터 수집

# cron-job.org에서 workflow_dispatch 호출:
#   09:05 KST → mode=morning
#   15:10 KST → mode=closing
#   18:30 KST → mode=evening

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mojito2 pandas numpy requests
          pip install hmmlearn scikit-learn

      - name: Restore state files
        uses: actions/cache@v4
        with:
          path: |
            state/bot_state_247540.json
            state/optimized_params_247540.json
            state/ohlcv_247540.json
            state/supply_data_247540.json
          key: ecoprobm-v4-bot-${{ github.run_number }}
          restore-keys: |
            ecoprobm-v4-bot-

      - name: Create state directory
        run: mkdir -p state

      - name: Run trading bot
        env:
          KIS_API_KEY: ${{ secrets.KIS_API_KEY }}
          KIS_API_SECRET: ${{ secrets.KIS_API_SECRET }}
          KIS_ACC_NO: ${{ secrets.KIS_ACC_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: "state"
        run: |
          python trading_bot.py \
            --mode ${{ github.event.inputs.mode || 'morning' }} \
            --state-dir state

      # evening 모드에서만 데이터 수집 추가 실행
      - name: Run data collection (evening only)
        if: ${{ github.event.inputs.mode == 'evening' }}
        env:
          KIS_API_KEY: ${{ secrets.KIS_API_KEY }}
          KIS_API_SECRET: ${{ secrets.KIS_API_SECRET }}
          KIS_ACC_NO: ${{ secrets.KIS_ACC_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: "state"
        run: |
          python data_collector.py \
            --mode incremental \
            --state-dir state

      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecoprobm-v4-bot-state-${{ github.run_number }}
          path: state/
          retention-days: 30

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "bot: ${{ github.event.inputs.mode || 'morning' }} $(date +%Y-%m-%d_%H%M)"
          git push
